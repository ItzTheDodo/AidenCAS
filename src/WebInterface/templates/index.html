<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/logo.ico') }}">
    <title>AidenCAS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/MarketingPipeline/GitHub-Buttons-Web-Component/version/1.0.0/src/github-buttons-wc.js" defer></script>
</head>
<body class="main_container">
    <div class="header" id="header">
        <div class="left_header">
            <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="AidenCAS Logo" class="logo" />
            <h1 class="title">AidenCAS</h1>
        </div>
        <github-button type="custom" text="AidenCAS Repo"
                       icon="data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='12 12 40 40'%3e%3cpath fill='%23333' d='M32 13.4c-10.5 0-19 8.5-19 19 0 8.4 5.5 15.5 13 18 1 .2 1.3-.4 1.3-.9v-3.2c-5.3 1.1-6.4-2.6-6.4-2.6-.9-2.1-2.1-2.7-2.1-2.7-1.7-1.2.1-1.1.1-1.1 1.9.1 2.9 2 2.9 2 1.7 2.9 4.5 2.1 5.5 1.6.2-1.2.7-2.1 1.2-2.6-4.2-.5-8.7-2.1-8.7-9.4 0-2.1.7-3.7 2-5.1-.2-.5-.8-2.4.2-5 0 0 1.6-.5 5.2 2 1.5-.4 3.1-.7 4.8-.7 1.6 0 3.3.2 4.7.7 3.6-2.4 5.2-2 5.2-2 1 2.6.4 4.6.2 5 1.2 1.3 2 3 2 5.1 0 7.3-4.5 8.9-8.7 9.4.7.6 1.3 1.7 1.3 3.5v5.2c0 .5.4 1.1 1.3.9 7.5-2.6 13-9.7 13-18.1 0-10.5-8.5-19-19-19z'/%3e%3c/svg%3e"
                       href="https://github.com/ItzTheDodo/AidenCAS"
                       new-window="true"></github-button>
    </div>
    <div class="display">
        <div class="sidebar" id="sidebar">

            <div class="example_box">
                <div class="example_definition">
                    <div class="function_display_button"></div>
                    <p class="example_function">
                        <span class="name">f</span>
                        :
                        <span class="domain_def">|R->|R</span>
                        ;
                        <span class="arguments">x</span>
                        ->
                        <span class="expression">2*x^2</span>
                    </p>
                </div>
                <div class="example_explaination">
                    <div class="name">Function name</div>
                    <div class="domain_def">Function domain</div>
                    <div class="arguments">Function arguments</div>
                    <div class="expression">Function expression</div>
                    <p style="padding-top: 10px; text-indent: 0;">See Github for docs</p>
                </div>
            </div>

            <div class="add_function_box" id="add_function_box" onclick="addFunctionOption()">
                <p class="add_function_text">Add Function</p>
            </div>

        </div>
        <canvas class="graphic_display" id="graphic_display">
            Your browser does not support the HTML5 canvas tag.

        </canvas>
    </div>
    <div class="footer" id="footer">
        <p class="footer_text">AidenCAS 2026 By Aiden Turner</p>
    </div>
</body>
</html>
